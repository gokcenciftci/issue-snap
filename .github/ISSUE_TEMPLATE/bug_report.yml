name: Bug report
description: Report unexpected IssueSnap behavior.
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, private URLs, personal data, customer data, or exploit details. See SECURITY.md for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: IssueSnap version or commit
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Load IssueSnap from chrome://extensions
        2. Open an HTTP(S) page
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include a minimal, sanitized reproduction or output.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and version
      placeholder: Google Chrome 126 on Windows 11
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets, private URLs, personal data, and customer data.
          required: true
        - label: This is not a security vulnerability.
          required: true
